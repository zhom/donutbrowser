name: Bug Report
description: Something isn't working
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug. What did you expect vs what actually happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Windows
        - Linux
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Donut Browser version
      placeholder: e.g. 0.17.6 or nightly-2026-03-21
    validations:
      required: true

  - type: dropdown
    id: browser
    attributes:
      label: Which browser is affected?
      options:
        - Wayfern
        - Camoufox
        - Both
        - Not browser-specific
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error logs or screenshots
      description: Run from terminal to get logs. Paste errors, screenshots, or screen recordings.
      placeholder: Paste logs here or drag screenshots
    validations:
      required: false
