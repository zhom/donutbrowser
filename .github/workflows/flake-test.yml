name: Flake Test

on:
  pull_request:
    paths:
      - "flake.nix"
      - "flake.lock"
      - ".github/workflows/flake-test.yml"
  push:
    branches:
      - main
    paths:
      - "flake.nix"
      - "flake.lock"
      - ".github/workflows/flake-test.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  flake:
    name: validate-flake
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: Install Nix
        uses: cachix/install-nix-action@a6f7623b2e2401f485f1eead77ced45bd99b09b0 #v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Evaluate flake outputs
        run: nix flake show --all-systems

      - name: Check setup app is exposed
        run: nix eval .#apps.x86_64-linux.setup.program --raw

      - name: Run flake setup app
        env:
          CI: "true"
        run: nix run .#setup

      - name: Run flake info app
        run: nix run .#info
